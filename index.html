<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

الحركة الميدانية | قسم التشغيل CCTV

</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- شاشة الشعار -->

<div id="splashScreen" class="splash-screen">

<img
src="IMG_3707.jpeg"
class="logo"
alt="Tahakom">

</div>

<!-- شاشة الترحيب -->

<div
id="welcomeScreen"
class="welcome-screen hidden">

<div class="welcome-card">

<h1>

الحركة الميدانية

</h1>

<h2>

قسم التشغيل CCTV

</h2>

<div class="welcome-line"></div>

<p>

نسأل الله لكم التوفيق والسلامة

<br>

في أداء مهامكم الميدانية

</p>

</div>

</div>

<!-- الصفحة الرئيسية -->

<div
id="homePage"
class="home-page hidden">

<header class="header">

<h1>

الحركة الميدانية

</h1>

<p>

قسم التشغيل CCTV

</p>

</header>

<main class="container"><!-- بطاقة البحث -->

<section
id="searchCard"
class="card">

<h2>

بيانات الخطة

</h2>

<label>

رقم الخطة

</label>

<input

type="number"

id="planNumber"

placeholder="أدخل رقم الخطة">

<button
id="searchBtn">

بحث

</button>

</section>

<!-- بطاقة المسار -->

<section

id="routeCard"

class="card hidden">

<h2>

اسم المسار

</h2>

<input

type="text"

id="routeName"

readonly>

<div class="buttons">

<button
id="missionBtn"
class="primary-btn">

بدء المهمة

</button>

<button
id="historyBtn"
class="secondary-btn">

سجل الخطط السابقة

</button>

</div>

<button
id="backBtn"
class="back-btn">

العودة

</button>

</section>

</main><footer>

إدارة أنظمة المراقبة الأمنية

<br>

قسم التشغيل CCTV

</footer>

</div>

<script src="plans.js"></script>

<script src="app.js"></script>

</body>

</html>
