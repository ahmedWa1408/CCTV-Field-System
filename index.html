<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية - CCTV</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<!-- شاشة الشعار -->

<section id="splashScreen" class="splash">

<div class="logo-box">

<img src="images/logo.png" alt="تحكم" class="logo">

</div>

</section>

<!-- رسالة الترحيب -->

<section id="welcomeScreen" class="welcome hidden">

<div class="welcome-card">

<h1>

مرحبًا بكم

</h1>

<p>

نسأل الله لكم التوفيق والسلامة

في أداء مهامكم الميدانية.

</p>

</div>

</section>

<!-- صفحة الخطة -->

<section id="planScreen" class="plan hidden">

<div class="plan-card">

<h2>

بيانات الخطة

</h2>

<label>

رقم الخطة

</label>

<input

type="number"

id="planNumber"

placeholder="أدخل رقم الخطة"

>

<button id="searchBtn">

بحث

</button>

</div>

</section>

<script src="plans.js"></script>

<script src="app.js"></script>

</body>

</html><!-- صفحة الخطة -->

<section id="planScreen" class="plan hidden">

    <div class="plan-card">

        <div class="card-header">

            <h2>بيانات الخطة</h2>

            <p>الحركة الميدانية لقسم التشغيل CCTV</p>

        </div>

        <div class="input-group">

            <label>رقم الخطة</label>

            <input
                type="number"
                id="planNumber"
                placeholder="أدخل رقم الخطة">

        </div>

        <button id="searchBtn" class="search-btn">

            بحث

        </button>

    </div>

</section>

<!-- صفحة المسار -->

<section id="routeScreen" class="route hidden">

    <div class="route-card">

        <h2>اسم المسار</h2>

        <h1 id="routeName"></h1>

        <button id="startRouteBtn" class="main-btn">

            بدء المسار

        </button>

        <button id="historyBtn" class="second-btn">

            سجلات المسار السابقة

        </button>

        <button id="backBtn" class="back-btn">

            العودة لرقم الخطة

        </button>

    </div>

</section>
