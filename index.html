<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- شاشة الترحيب -->

<div id="welcomeScreen" class="welcome-screen">

<div class="welcome-card">

<h1>الحركة الميدانية</h1>

<h2>قسم التشغيل CCTV</h2>

<div class="welcome-line"></div>

<p>

نسأل الله لكم التوفيق والسلامة

<br>

في أداء مهامكم.


</p>

</div>

</div>

<!-- الصفحة الرئيسية -->

<div id="homePage" class="home-page hidden">

<header class="top-header">

<h1>

الحركة الميدانية

</h1>

<h2>

قسم التشغيل CCTV

</h2>

</header>

<section class="plan-card">

<h3>

بيانات الخطة

</h3>

<label>

رقم الخطة

</label>

<input
id="planNumber"
type="number">

<button id="searchBtn">

بحث

</button></section>

<section
id="routeCard"
class="route-card hidden">

<h3>

اسم المسار

</h3>

<input
id="routeName"
type="text"
readonly>

<button
id="startMission">

بدء المهمة

</button>

<button
id="historyBtn"
class="gray-btn">

سجل الخطط السابقة

</button>

<button
id="backBtn"
class="outline-btn">

رجوع

</button>

</section>

<footer>

إدارة أنظمة المراقبة الأمنية

<br>

قسم التشغيل CCTV

</footer>

</div>

<script src="plans.js"></script>
<script src="app.js"></script>

</body>
</html>
